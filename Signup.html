    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body style="background-image: url(Img/Background.jpg); background-size: cover; background-attachment: fixed;">

    <div class="signup-container">
        <form action="Results.html" method="get" class="signup-form">
            <h1><i>Create an account</i></h1>

            <input type="text" id="firstname" placeholder="First name" required>
            <input type="text" id="secondname" placeholder="Second name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="tel" id="phone" placeholder="Phone number" required>
            
            <label for="dob">Date of birth</label>
            <input type="date" id="dob" required>

            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <label for="nationality">Nationality</label>
            <select id="nationality" name="nationality" required>
                <option value="jordanian">Jordan</option>
                <option value="saudi">Saudi</option>
                <option value="egyptian">Egypt</option>
                <option value="other">Other</option>
            </select>

            <input type="submit" value="Send" class="SignupBTN">
        </form>
    </div>
